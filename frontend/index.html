<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container" style="width: 600px; height: auto; padding: 40px; display:flex; align-items:flex-start;">
    <div style="width: 100%; text-align: center;">
      <h1 style="margin-bottom: 12px;">Home</h1>
      <p id="status" style="margin: 0; color:#333;"></p>
      <button id="logout-btn" class="btn" style="width: 240px; margin-top: 18px; height: 44px;">Logout</button>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const logoutBtn = document.getElementById('logout-btn');

    const token = localStorage.getItem('token');
    if (token) {
      statusEl.innerText = 'You are logged in (token found in localStorage).';
    } else {
      statusEl.innerText = 'You are not logged in. Redirecting...';
      setTimeout(() => {
        window.location.href = 'login_register.html';
      }, 1200);
    }

    logoutBtn.addEventListener('click', () => {
      localStorage.removeItem('token');
      window.location.href = 'login_register.html';
    });
  </script>
</body>
</html>
