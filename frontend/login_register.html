<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Signup Form</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- Login Form -->
    <div class="form-box login">
        <form id="login-form">
            <h1>Login</h1>

            <div class="input-box">
                <input type="email" id="login-email" placeholder="Email" required>
                <i class="fa-solid fa-envelope"></i> 
            </div>

            <div class="input-box">
                <input type="password" id="login-password" placeholder="Password" required>
                <i class="fa-solid fa-lock"></i>
            </div>

            <div class="forgot-link">
                <a href="reset_password.html" id="forgot-password-link">Forgot Password?</a>
            </div>

            <button type="submit" class="btn">Login</button>

            <p>or login with social platforms</p>

            <div class="social-icons">
                <a href="http://localhost:5000/api/auth/google"><i class="fa-brands fa-google"></i></a>
                <a href="http://localhost:5000/api/auth/facebook"><i class="fa-brands fa-facebook"></i></a>
                <a href="http://localhost:5000/api/auth/github"><i class="fa-brands fa-square-github"></i></a>
            </div>
            <p id="login-message"></p>
            <p id="forgot-message"></p>
        </form>
    </div>

    <!-- Register Form -->
    <div class="form-box register">
        <form id="register-form">
            <h1>Registration</h1>

            <div class="input-box">
                <input type="text" id="register-username" placeholder="Username" required>
                <i class="fa-solid fa-user"></i> 
            </div>

            <div class="input-box">
                <input type="email" id="register-email" placeholder="Email" required>
                <i class="fa-solid fa-envelope"></i>
            </div>

            <div class="input-box">
                <input type="password" id="register-password" placeholder="Password" required>
                <i class="fa-solid fa-lock"></i>
            </div>

            <div class="input-box">
                <select id="register-role" required>
                    <option value="">Select Role</option>
                    <option value="victim">Victim</option>
                    <option value="volunteer">Volunteer</option>
                    <option value="admin">Admin</option>
                </select>
                <i class="fa-solid fa-user-tag"></i>
            </div>

            <button type="submit" class="btn">Register</button>

            <p>or register with social platforms</p>

            <div class="social-icons">
                <a href="http://localhost:5000/api/auth/google"><i class="fa-brands fa-google"></i></a>
                <a href="http://localhost:5000/api/auth/facebook"><i class="fa-brands fa-facebook"></i></a>
                <a href="http://localhost:5000/api/auth/github"><i class="fa-brands fa-square-github"></i></a>
            </div>
            <p id="register-message"></p>
        </form>
    </div>

    <!-- Toggle Box -->
    <div class="toggle-box">

        <div class="toggle-panel toggle-left">
            <h1>Hello, Welcome!</h1>
            <p>Don't have an account?</p>
            <button class="btn register-btn">Register</button>
        </div>

        <div class="toggle-panel toggle-right">
            <h1>Welcome Back!</h1>
            <p>Already have an account?</p>
            <button class="btn login-btn">Login</button>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
