<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <div class="container" style="width: 520px;">
        <div class="form-box login" style="position: relative; width: 100%; right: 0; visibility: visible;">
            <form id="reset-form">
                <h1>Reset Password</h1>

                <div class="input-box">
                    <input type="password" id="new-password" placeholder="New Password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <button type="submit" class="btn" type="submit">Update Password</button>
                <p id="reset-message"></p>

                <p style="margin-top: 12px;">
                    <a href="login_register.html" style="color:#333;">Back to login</a>
                </p>
            </form>
        </div>
    </div>

    <script src="reset_password.js"></script>
</body>
</html>
